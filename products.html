<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Karrystores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-red { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .product-card { transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-red text-white">
    <div class="container">
        <a class="navbar-brand text-white" href="index.html"><i class="fas fa-car"></i> Karrystores</a>
        <a href="index.html" class="btn btn-outline-light">← Back to Store</a>
    </div>
</nav>

<div class="container py-5">
    <h1 class="text-center mb-4">All Products</h1>
    <p class="text-center mb-5">Browse our complete collection of premium car bumpers</p>
    <div class="row" id="productsContainer"></div>
</div>

<footer class="bg-dark text-white py-3 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 Karrystores | Worldwide Shipping from Dubai</p>
    </div>
</footer>

<script>
const products = JSON.parse(localStorage.getItem('karrystores_products') || '[]');
const defaultProducts = [
    { name: "Front Bumper Toyota Mark X", car_model: "Mark X", car_year: "2010-2015", price: 250, image: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400" },
    { name: "Rear Bumper Toyota Premio", car_model: "Premio", car_year: "2012-2018", price: 220, image: "https://images.unsplash.com/photo-1552519507-88aa2dfa9fdb?w=400" },
    { name: "Front Bumper Toyota Axio", car_model: "Axio", car_year: "2010-2016", price: 200, image: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400" }
];

const displayProducts = products.length > 0 ? products : defaultProducts;

const container = document.getElementById('productsContainer');
container.innerHTML = displayProducts.map(p => `
    <div class="col-md-4 mb-4">
        <div class="card product-card h-100 shadow-sm">
            <img src="${p.image}" class="card-img-top" style="height: 200px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title">${p.name}</h5>
                <p class="card-text text-muted">${p.car_model} • ${p.car_year}</p>
                <h4 class="text-danger">$${p.price}</h4>
                <a href="index.html" class="btn btn-danger w-100">Shop Now</a>
            </div>
        </div>
    </div>
`).join('');
</script>
</body>
</html>
