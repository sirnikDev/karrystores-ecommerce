<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Karrystores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-red { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .contact-card { transition: transform 0.3s; }
        .contact-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-red text-white">
    <div class="container">
        <a class="navbar-brand text-white" href="index.html"><i class="fas fa-car"></i> Karrystores</a>
        <a href="index.html" class="btn btn-outline-light">← Back to Store</a>
    </div>
</nav>

<div class="container py-5">
    <h1 class="text-center mb-4">Contact Us</h1>
    <p class="text-center mb-5">We're here to help 24/7</p>
    
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card contact-card text-center p-4 shadow-sm h-100">
                <i class="fab fa-whatsapp fa-3x text-success"></i>
                <h5 class="mt-3">WhatsApp</h5>
                <p class="mb-2">Quickest response</p>
                <a href="https://wa.me/254727939626" class="btn btn-success" target="_blank">Chat Now →</a>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card contact-card text-center p-4 shadow-sm h-100">
                <i class="fas fa-envelope fa-3x text-danger"></i>
                <h5 class="mt-3">Email</h5>
                <p class="mb-2">info@karrystores.com</p>
                <p class="small text-muted">Response within 24 hours</p>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card contact-card text-center p-4 shadow-sm h-100">
                <i class="fas fa-map-marker-alt fa-3x text-info"></i>
                <h5 class="mt-3">Location</h5>
                <p class="mb-2">Dubai, United Arab Emirates</p>
                <p class="small text-muted">Shipping Worldwide</p>
            </div>
        </div>
    </div>
    
    <div class="row mt-4">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4">Send us a Message</h4>
                    <form id="contactForm">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="contactName" placeholder="Your Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" id="contactEmail" placeholder="Your Email" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" id="contactMessage" rows="4" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100"><i class="fab fa-whatsapp"></i> Send via WhatsApp</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 Karrystores | Worldwide Shipping from Dubai</p>
    </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('contactName').value;
    const email = document.getElementById('contactEmail').value;
    const message = document.getElementById('contactMessage').value;
    
    const whatsappMsg = `*Contact Form Message*%0A%0A*Name:* ${name}%0A*Email:* ${email}%0A*Message:* ${message}`;
    window.open(`https://wa.me/254727939626?text=${whatsappMsg}`, '_blank');
    alert('Message sent! We will reply on WhatsApp.');
    this.reset();
});
</script>
</body>
</html>
