<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Karrystores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-red { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .sidebar { background: #f8f9fa; min-height: calc(100vh - 56px); }
        @media (max-width: 768px) {
            .sidebar { min-height: auto; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-red text-white">
    <div class="container">
        <a class="navbar-brand text-white" href="index.html"><i class="fas fa-car"></i> Karrystores Admin</a>
        <div class="ms-auto">
            <a href="index.html" class="btn btn-outline-light me-2"><i class="fas fa-store"></i> View Store</a>
            <button class="btn btn-outline-light" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar p-3">
            <h5><i class="fas fa-box"></i> Management</h5>
            <hr>
            <button class="btn btn-danger w-100 mb-2" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openAddModal()">
                <i class="fas fa-plus"></i> Add Product
            </button>
            <button class="btn btn-secondary w-100" onclick="exportProducts()">
                <i class="fas fa-download"></i> Backup Products
            </button>
            <button class="btn btn-secondary w-100 mt-2" onclick="importProducts()">
                <i class="fas fa-upload"></i> Restore Backup
            </button>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 p-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0"><i class="fas fa-list"></i> Product List</h4>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr><th>Image</th><th>Name</th><th>Model</th><th>Year</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="productsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="modalTitle">Add Product</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Car Model *</label>
                            <input type="text" class="form-control" id="carModel" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Car Year</label>
                            <input type="text" class="form-control" id="carYear" placeholder="e.g., 2010-2015">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Price ($) *</label>
                            <input type="number" class="form-control" id="price" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" class="form-control" id="stock" value="10">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Condition</label>
                            <select class="form-select" id="condition">
                                <option value="new">New</option>
                                <option value="used">Used</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Image URL *</label>
                            <input type="url" class="form-control" id="imageUrl" required>
                            <small class="text-muted">Use images from Unsplash, Google Images, or any image URL</small>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" placeholder="Detailed product description..."></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>
</div>

<script>
let products = [];

function checkAuth() {
    const isLoggedIn = localStorage.getItem('karrystores_admin');
    if (!isLoggedIn) {
        const password = prompt('Enter admin password:');
        if (password === 'admin123') {
            localStorage.setItem('karrystores_admin', 'true');
        } else {
            alert('Wrong password!');
            window.location.href = 'index.html';
        }
    }
}

function logout() {
    localStorage.removeItem('karrystores_admin');
    window.location.href = 'index.html';
}

function loadProducts() {
    const saved = localStorage.getItem('karrystores_products');
    if (saved && JSON.parse(saved).length > 0) {
        products = JSON.parse(saved);
    } else {
        products = [
            { id: 1, name: "Front Bumper Toyota Mark X", description: "Original quality front bumper for Toyota Mark X", price: 250, car_model: "Mark X", car_year: "2010-2015", condition: "new", stock: 10, image: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400" },
            { id: 2, name: "Rear Bumper Toyota Premio", description: "High quality rear bumper for Toyota Premio", price: 220, car_model: "Premio", car_year: "2012-2018", condition: "new", stock: 8, image: "https://images.unsplash.com/photo-1552519507-88aa2dfa9fdb?w=400" },
            { id: 3, name: "Front Bumper Toyota Axio", description: "Durable front bumper for Toyota Axio", price: 200, car_model: "Axio", car_year: "2010-2016", condition: "used", stock: 5, image: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400" }
        ];
        localStorage.setItem('karrystores_products', JSON.stringify(products));
    }
    displayProducts();
}

function displayProducts() {
    const tbody = document.getElementById('productsTable');
    if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center">No products found</td></tr>';
        return;
    }
    
    tbody.innerHTML = products.map(product => `
        <tr>
            <td><img src="${product.image}" class="product-img" onerror="this.src='https://via.placeholder.com/60'"></td>
            <td><strong>${product.name}</strong><br><small class="text-muted">${(product.description || '').substring(0, 40)}...</small></td>
            <td>${product.car_model}</td>
            <td>${product.car_year}</td>
            <td class="text-danger fw-bold">$${product.price}</td>
            <td>${product.stock}</td>
            <td>
                <button class="btn btn-sm btn-primary mb-1" onclick="editProduct(${product.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.id})"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function saveProduct() {
    const id = document.getElementById('productId').value;
    const product = {
        id: id ? parseInt(id) : Date.now(),
        name: document.getElementById('productName').value,
        description: document.getElementById('description').value,
        price: parseFloat(document.getElementById('price').value),
        car_model: document.getElementById('carModel').value,
        car_year: document.getElementById('carYear').value,
        condition: document.getElementById('condition').value,
        stock: parseInt(document.getElementById('stock').value),
        image: document.getElementById('imageUrl').value
    };
    
    if (!product.name || !product.car_model || !product.price || !product.image) {
        alert('Please fill all required fields');
        return;
    }
    
    if (id) {
        const index = products.findIndex(p => p.id === parseInt(id));
        products[index] = product;
    } else {
        products.push(product);
    }
    
    localStorage.setItem('karrystores_products', JSON.stringify(products));
    displayProducts();
    
    bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
    document.getElementById('productForm').reset();
    alert('Product saved successfully!');
}

function editProduct(id) {
    const product = products.find(p => p.id === id);
    if (product) {
        document.getElementById('productId').value = product.id;
        document.getElementById('productName').value = product.name;
        document.getElementById('description').value = product.description || '';
        document.getElementById('price').value = product.price;
        document.getElementById('carModel').value = product.car_model;
        document.getElementById('carYear').value = product.car_year;
        document.getElementById('condition').value = product.condition;
        document.getElementById('stock').value = product.stock;
        document.getElementById('imageUrl').value = product.image;
        
        document.getElementById('modalTitle').innerText = 'Edit Product';
        new bootstrap.Modal(document.getElementById('productModal')).show();
    }
}

function deleteProduct(id) {
    if (confirm('Are you sure you want to delete this product?')) {
        products = products.filter(p => p.id !== id);
        localStorage.setItem('karrystores_products', JSON.stringify(products));
        displayProducts();
        alert('Product deleted!');
    }
}

function openAddModal() {
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('modalTitle').innerText = 'Add Product';
}

function exportProducts() {
    const data = JSON.stringify(products, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'karrystores-backup.json';
    a.click();
    URL.revokeObjectURL(url);
    alert('Products backed up successfully!');
}

function importProducts() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const imported = JSON.parse(event.target.result);
            if (imported && imported.length > 0) {
                products = imported;
                localStorage.setItem('karrystores_products', JSON.stringify(products));
                displayProducts();
                alert('Products restored successfully!');
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

checkAuth();
loadProducts();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
